<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a14">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="/manifest.json">
  <title>Made Just for You</title>
  <link rel="stylesheet" href="/css/chat.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <header class="chat-header">
    <div class="header-left">
      <div class="header-info">
        <h1>Made Just for You 😊</h1>
        <p id="onlineStatus" class="online-status">connecting...</p>
      </div>
    </div>
    <div class="header-right">
      <button class="logout-btn" id="logoutBtn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </header>

  <div id="typingIndicator" class="typing-indicator" style="display:none;">
    <span class="typing-name"></span> is typing
    <div class="typing-dots"><span></span><span></span><span></span></div>
  </div>

  <main class="chat-messages" id="chatMessages">
    <div class="welcome-msg">
      <div class="welcome-icon">✨</div>
      <p>Welcome! Messages vanish on reload.</p>
      <p class="small">Anonymous Chat | No Trace | Vanish</p>
    </div>
  </main>

  <div id="replyPreview" class="reply-preview" style="display:none;">
    <div class="reply-preview-content">
      <div class="reply-preview-bar"></div>
      <div class="reply-preview-text">
        <span class="reply-preview-name"></span>
        <span class="reply-preview-msg"></span>
      </div>
    </div>
    <button class="reply-cancel" id="replyCancelBtn">✕</button>
  </div>

  <div id="voiceRecordingBar" class="voice-recording-bar" style="display:none;">
    <button class="voice-cancel-btn" id="voiceCancelBtn">✕</button>
    <div class="voice-recording-info">
      <div class="voice-red-dot"></div>
      <span class="voice-timer" id="voiceTimer">0:00</span>
    </div>
    <button class="voice-send-btn" id="voiceSendBtn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>

  <footer class="chat-input-area" id="chatInputArea">
    <div class="input-wrapper">
      <button class="attach-btn" id="attachBtn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
      </button>
      <button class="image-btn" id="imageBtn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      </button>
      <input type="text" id="messageInput" placeholder="Type a message..." autocomplete="off">
      <button class="voice-btn" id="voiceBtn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
      </button>
      <button class="send-btn" id="sendBtn" style="display:none;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
    <input type="file" id="imageInput" accept="image/*" style="display:none;">
    <input type="file" id="fileInput" style="display:none;">
  </footer>

  <div id="imageModal" class="image-modal" style="display:none;">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <button class="modal-close" id="modalClose">✕</button>
      <img id="modalImage" src="" alt="">
    </div>
  </div>

  <div id="contextOverlay" class="context-overlay" style="display:none;"></div>
  <div id="contextMenu" class="context-menu" style="display:none;">
    <div class="context-reactions" id="contextReactions">
      <button class="cr" data-emoji="❤️">❤️</button>
      <button class="cr" data-emoji="😂">😂</button>
      <button class="cr" data-emoji="😮">😮</button>
      <button class="cr" data-emoji="😢">😢</button>
      <button class="cr" data-emoji="👍">👍</button>
      <button class="cr" data-emoji="🔥">🔥</button>
    </div>
    <button class="ctx-btn reply-action" id="contextReplyBtn"><span>↩️</span>Reply</button>
    <button class="ctx-btn delete-action" id="contextDeleteBtn"><span>🗑️</span>Delete</button>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/chat.js"></script>
</body>
</html>
